name: ❓ Question
description: Ask a question about using or extending FarmGPT AI
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For open-ended discussion, please prefer [GitHub Discussions](https://github.com/your-username/farmgpt-ai/discussions).
        Use this template only if your question doesn't fit there.

  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: What have you already tried?
