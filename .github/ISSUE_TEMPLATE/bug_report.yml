name: 🐛 Bug Report
description: Report a reproducible bug in FarmGPT AI
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! 🌾
        Please fill out the sections below so we can reproduce and fix the issue quickly.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
      placeholder: When I click "Continue with Google", the page reloads and I stay on /login.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to /login
        2. Click "Continue with Google"
        3. Complete the Google consent screen
        4. Observe redirect back to /login instead of /dashboard
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: After Google consent, I should land on /dashboard.
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: Chrome 128 on macOS 14.5
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Production (lovable.app)
        - Preview (id-preview URL)
        - Local dev (bun run dev)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console / network errors
      description: Paste any relevant console output or failed network requests.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag & drop images here.

  - type: checkboxes
    id: terms
    attributes:
      label: Checks
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have read the [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
